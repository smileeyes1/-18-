<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مع الله نجمع حتى ١٨ 🌟</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #e0f7fa, #fffde7);
            margin: 0;
            padding: 0;
            color: #2c3e50;
            overflow-x: hidden;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .header {
            text-align: center;
            padding: 25px;
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }
        h1 { color: #1e88e5; font-size: 2.9em; margin: 10px 0; }
        .welcome { font-size: 1.6em; color: #1565c0; }
        .stage {
            background: white;
            border-radius: 25px;
            padding: 35px;
            margin: 25px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            min-height: 480px;
        }
        button {
            background: #4caf50;
            color: white;
            border: none;
            padding: 16px 35px;
            font-size: 1.35em;
            border-radius: 50px;
            cursor: pointer;
            margin: 12px;
            transition: all 0.3s;
        }
        button:hover { background: #388e3c; transform: scale(1.06); }
        button:disabled { background: #bbbbbb; cursor: not-allowed; transform: none; }
        .character {
            display: inline-block;
            background: #fff;
            padding: 18px 30px;
            border-radius: 50px;
            margin: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            cursor: pointer;
            font-size: 1.15em;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            padding: 12px 20px;
            font-size: 1.2em;
        }
        input {
            font-family: 'Cairo', sans-serif;
            text-align: center;
        }
        .correct { color: #4caf50; font-weight: bold; }
        .feedback { font-size: 1.6em; margin: 20px 0; min-height: 60px; }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ ملء الشاشة</button>

    <div class="container">
        <!-- شاشة الأسماء -->
        <div id="nameScreen" class="stage">
            <h1>مرحبا بك في درس الجمع الجميل 🌟</h1>
            <p class="welcome">لنبدأ رحلتنا معًا باسم الله...</p>
            
            <div style="margin: 45px 0;">
                <label style="font-size: 1.5em; display: block; margin: 18px 0 8px;">اسم الطالب الغالي:</label>
                <input type="text" id="studentName" placeholder="اكتب اسمك هنا..." 
                       style="width: 85%; padding: 18px; font-size: 1.5em; border-radius: 18px; border: 3px solid #4caf50;">
            </div>
            
            <div style="margin: 45px 0;">
                <label style="font-size: 1.5em; display: block; margin: 18px 0 8px;">اسم ولي الأمر الكريم:</label>
                <input type="text" id="parentName" placeholder="اسم الأب أو الأم..." 
                       style="width: 85%; padding: 18px; font-size: 1.5em; border-radius: 18px; border: 3px solid #4caf50;">
            </div>
            
            <button onclick="startLesson()" style="font-size: 1.7em; padding: 22px 60px;">
                ابدأ الحصة الآن 🌟
            </button>
        </div>

        <!-- الدرس الرئيسي -->
        <div id="lessonScreen" style="display: none;">
            <div class="header">
                <h1 id="greeting">مع الله نجمع حتى ١٨ 🌟</h1>
                <p id="welcomeText" class="welcome"></p>
            </div>

            <div class="stage" id="stageContent"></div>

            <div style="text-align: center; margin: 25px 0;">
                <button id="nextBtn" onclick="nextStage()" disabled>التالي →</button>
            </div>

            <!-- شخصيات الدعم -->
            <div style="text-align: center; margin-top: 35px;">
                <div class="character" onclick="showHelp('nour')">🧠 الحكيم نور</div>
                <div class="character" onclick="showHelp('teacher')">📖 المعلم محمد</div>
                <div class="character" onclick="showHelp('parent')">❤️ الأم / الأب</div>
            </div>
        </div>
    </div>

    <script>
        let studentName = "";
        let parentName = "";
        let currentStage = 0;
        let timer = null;
        let starsCollected = 0;
        let correctAnswers = 0;
        let totalAttempts = 0;
        let currentDifficulty = 1; // 1 = سهل، 2 = متوسط، 3 = أصعب

        const stages = [
            {
                title: "المرحلة الأولى: ما هو الجمع؟",
                content: `<h2 style="color:#1565c0;">يا {student} الغالي، الجمع يعني أن نضع الأشياء مع بعضها</h2>
                          <p style="font-size:1.5em;">مثال: تفاحة واحدة 🍎 + تفاحة أخرى 🍎 = كم تفاحة؟</p>
                          <p style="font-size:2.8em; color:#4caf50; text-align:center; margin:40px 0;">١ + ١ = ٢</p>
                          <p style="font-size:1.4em;">الله يبارك لك كل محاولة جميلة تحاولها ❤️</p>`
            },
            {
                title: "المرحلة الثانية: نجمع حتى ١٠",
                content: `<h2>دعنا نجرب معًا يا {student}:</h2>
                          <div style="font-size:2.6em; text-align:center; margin:40px 0;">
                              <span id="question">٣ + ٤ = </span>
                              <input type="text" id="answerInput" maxlength="2" style="width:100px; font-size:2em; text-align:center; border:3px solid #4caf50; border-radius:12px;">
                          </div>
                          <div class="feedback" id="feedback"></div>
                          <button onclick="checkMathAnswer()">تحقق من إجابتي</button>`
            },
            {
                title: "المرحلة الثالثة: لعبة النجوم السحرية ✨",
                content: `<h2>ساعدني يا {student} في جمع النجوم بالجمع الصحيح!</h2>
                          <p id="gameScore" style="font-size:2.2em; color:#ff9800;">النجوم المجموعة: ٠ / ١٨</p>
                          <div id="starsContainer" style="font-size:4.8em; text-align:center; min-height:200px; line-height:1.1;"></div>
                          <div style="margin:25px 0;">
                              <span id="gameQuestion" style="font-size:2.2em;"></span>
                              <input type="text" id="gameAnswer" maxlength="2" style="width:90px; font-size:2em; text-align:center; border:3px solid #ff9800; border-radius:12px;">
                          </div>
                          <button onclick="checkGameAnswer()">أجب وأضف نجمة</button>
                          <button onclick="resetGame()">ابدأ من جديد</button>`
            },
            {
                title: "المرحلة الرابعة: تطبيق في دفترك الحقيقي",
                content: `<h2>الآن خذ دفترك الحقيقي واكتب بخط جميل يا {student}:</h2>
                          <p style="font-size:1.7em; margin:25px 0;">١. ٥ + ٦ = ؟</p>
                          <p style="font-size:1.7em; margin:25px 0;">٢. ٨ + ٧ = ؟</p>
                          <p style="font-size:1.7em; margin:25px 0;">٣. ٩ + ٩ = ؟</p>
                          <p style="color:#4caf50; font-size:1.5em;">اكتب الإجابات في دفترك ثم اضغط "التالي" لنرى معًا</p>`
            },
            {
                title: "الختام: دعاء وتقرير تربوي",
                content: `<h2 style="color:#1565c0; text-align:center;">بارك الله فيك يا {student}!</h2>
                          <p style="font-size:1.9em; text-align:center;">كل محاولة قمت بها اليوم هي عبادة جميلة يراها الله ويباركها.</p>
                          <p style="font-size:1.7em; text-align:center;">{parent} فخور بك جدًا، وأنا فخور بك أيضًا.</p>
                          <div id="report" style="background:#f0f8ff; padding:20px; border-radius:20px; margin:30px 0; font-size:1.4em;"></div>
                          <p style="font-size:2.2em; color:#4caf50; text-align:center;">الله معك دائمًا، والصبر مفتاح الفهم 🌟</p>`
            }
        ];

        function startLesson() {
            studentName = document.getElementById("studentName").value.trim() || "يا بطل";
            parentName = document.getElementById("parentName").value.trim() || "ولي الأمر الكريم";
            
            localStorage.setItem("studentName", studentName);
            localStorage.setItem("parentName", parentName);

            document.getElementById("nameScreen").style.display = "none";
            document.getElementById("lessonScreen").style.display = "block";
            
            document.getElementById("greeting").textContent = "مع الله نجمع حتى ١٨ 🌟";
            document.getElementById("welcomeText").innerHTML = `مرحبا ${studentName}، ${parentName} معنا اليوم!`;
            
            currentStage = 0;
            starsCollected = 0;
            correctAnswers = 0;
            totalAttempts = 0;
            currentDifficulty = 1;
            showStage();
        }

        function showStage() {
            const contentDiv = document.getElementById("stageContent");
            let html = `<h2 style="color:#1e88e5;">${stages[currentStage].title}</h2>`;
            html += stages[currentStage].content
                .replace(/{student}/g, studentName)
                .replace(/{parent}/g, parentName);
            
            contentDiv.innerHTML = html;

            // تفعيل زر التالي بعد ١٠ ثوانٍ
            document.getElementById("nextBtn").disabled = true;
            clearTimeout(timer);
            timer = setTimeout(() => {
                document.getElementById("nextBtn").disabled = false;
            }, 10000);

            // تهيئة المرحلة الثانية والثالثة
            if (currentStage === 1) generateNewMathQuestion();
            if (currentStage === 2) generateNewGameQuestion();
            if (currentStage === 4) showFinalReport();
        }

        function nextStage() {
            currentStage++;
            if (currentStage >= stages.length) {
                alert(`انتهت الحصة بنجاح! بارك الله فيك يا ${studentName} 🌟`);
                currentStage = stages.length - 1;
            }
            showStage();
        }

        // مرحلة ٢: أسئلة الجمع مع تكييف
        let currentMathAnswer = 0;
        function generateNewMathQuestion() {
            const a = Math.floor(Math.random() * (5 + currentDifficulty * 3)) + 1;
            const b = Math.floor(Math.random() * (5 + currentDifficulty * 3)) + 1;
            currentMathAnswer = a + b;
            document.getElementById("question").textContent = `${a} + ${b} = `;
            document.getElementById("answerInput").value = "";
            document.getElementById("feedback").innerHTML = "";
        }

        function checkMathAnswer() {
            totalAttempts++;
            const input = parseInt(document.getElementById("answerInput").value);
            const feedbackDiv = document.getElementById("feedback");
            
            if (input === currentMathAnswer) {
                correctAnswers++;
                feedbackDiv.innerHTML = `<span class="correct">✅ ممتاز يا ${studentName}! الله يبارك جهدك</span>`;
                // زيادة الصعوبة تدريجيًا
                if (correctAnswers % 3 === 0 && currentDifficulty < 3) currentDifficulty++;
                setTimeout(() => generateNewMathQuestion(), 1800);
            } else {
                feedbackDiv.innerHTML = `👍 حاول مرة أخرى يا بطل، كل محاولة ترفعك درجة`;
            }
        }

        // مرحلة ٣: لعبة النجوم مع جمع حقيقي
        let currentGameAnswer = 0;
        function generateNewGameQuestion() {
            const a = Math.floor(Math.random() * 9) + 2;
            const b = Math.floor(Math.random() * 9) + 2;
            currentGameAnswer = a + b;
            document.getElementById("gameQuestion").innerHTML = `كم تساوي: <b>${a} + ${b}</b> ؟`;
            document.getElementById("gameAnswer").value = "";
        }

        function checkGameAnswer() {
            totalAttempts++;
            const input = parseInt(document.getElementById("gameAnswer").value);
            
            if (input === currentGameAnswer) {
                correctAnswers++;
                starsCollected = Math.min(starsCollected + 1, 18);
                document.getElementById("gameScore").textContent = `النجوم المجموعة: ${starsCollected} / ١٨`;
                document.getElementById("starsContainer").innerHTML += "✨ ";
                
                if (starsCollected === 18) {
                    alert(`🎉 رائع جدًا يا ${studentName}! جمعت ١٨ نجمة! الله يباركك`);
                }
                setTimeout(() => generateNewGameQuestion(), 1500);
            } else {
                alert(`حاول مرة أخرى يا بطل، أنت قريب جدًا!`);
            }
        }

        function resetGame() {
            starsCollected = 0;
            document.getElementById("gameScore").textContent = `النجوم المجموعة: ٠ / ١٨`;
            document.getElementById("starsContainer").innerHTML = "";
            generateNewGameQuestion();
        }

        function showFinalReport() {
            const accuracy = totalAttempts > 0 ? Math.round((correctAnswers / totalAttempts) * 100) : 100;
            const reportHTML = `
                <strong>تقرير الحصة التربوي لـ ${parentName}:</strong><br><br>
                • عدد المحاولات: ${totalAttempts}<br>
                • الإجابات الصحيحة: ${correctAnswers}<br>
                • نسبة التقدم: ${accuracy}٪<br>
                • النجوم المجموعة: ${starsCollected} من ١٨<br><br>
                يا ${studentName}، أنت رائع! كل محاولة كانت عبادة جميلة.
            `;
            document.getElementById("report").innerHTML = reportHTML;
        }

        function showHelp(type) {
            if (type === "nour") {
                alert(`🧠 الحكيم نور يقول:\nيا ${studentName}، الصبر طريق الفهم، والله معك في كل خطوة. خذ وقتك وستفهم بإذن الله.`);
            } else if (type === "teacher") {
                alert(`📖 المعلم محمد يقول:\nدعنا نجرب ببطء: ٥ + ٣ = ٨\nهل تريد أن أشرح لك مرة أخرى؟`);
            } else if (type === "parent") {
                alert(`❤️ ${parentName} يقول:\nأنا فخور بك جدًا يا ${studentName}، استمر أنت رائع! الله يحفظك.`);
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // تحميل الأسماء المحفوظة
        window.onload = () => {
            const savedStudent = localStorage.getItem("studentName");
            if (savedStudent) {
                studentName = savedStudent;
                parentName = localStorage.getItem("parentName") || "ولي الأمر الكريم";
                document.getElementById("nameScreen").style.display = "none";
                document.getElementById("lessonScreen").style.display = "block";
                document.getElementById("greeting").textContent = "مع الله نجمع حتى ١٨ 🌟";
                document.getElementById("welcomeText").innerHTML = `مرحبا ${studentName}، ${parentName} معنا اليوم!`;
                showStage();
            }
        };
    </script>
</body>
</html>
